services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: afrohit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: afrohit
      POSTGRES_PASSWORD: afrohit
      POSTGRES_DB: afrohit
    ports:
      - "5432:5432"
    volumes:
      - afrohit_pg_data:/var/lib/postgresql/data
      - ./packages/db/sql/00-extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrohit -d afrohit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: afrohit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - afrohit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: afrohit-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: afrohit
      MINIO_ROOT_PASSWORD: afrohitsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - afrohit_minio_data:/data

volumes:
  afrohit_pg_data:
  afrohit_redis_data:
  afrohit_minio_data:
