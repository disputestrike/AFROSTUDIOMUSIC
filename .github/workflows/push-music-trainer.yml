# Build + push the private ACE-Step music trainer to Replicate.
# One operator errand: add repo secret REPLICATE_API_TOKEN (Settings → Secrets),
# then run this workflow (Actions → push-music-trainer → Run workflow).
# Docker builds happen in CI — never on the dev PC (Docker Desktop is unreliable there).
name: push-music-trainer
on:
  workflow_dispatch:
    inputs:
      owner:
        description: "Replicate account owner (username/org)"
        required: true
        default: "disputestrike"
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        # The torch + CUDA 12.1 + cuDNN + ACE-Step image is ~20GB; the default
        # runner only has ~14GB free. Reclaim ~25GB of preinstalled toolchains.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost /opt/hostedtoolcache \
                      /usr/local/lib/node_modules /usr/share/swift || true
          sudo docker image prune -af || true
          df -h /
      - name: Install cog
        # PINNED v0.9.8 — the version Replicate's own setup-cog action uses in CI.
        # It's the line that accepts the API token via `cog login --token-stdin`;
        # newer cogs (0.21+) demand a separate browser-issued CLI auth token and
        # reject API tokens, which killed two full 30-min builds at the registry.
        run: |
          sudo curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/download/v0.9.8/cog_$(uname -s)_$(uname -m)
          sudo chmod +x /usr/local/bin/cog
      - name: Resolve account + ensure model page exists
        id: model
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        # r8.im rejects pushes to a model page that doesn't exist (it surfaces as
        # "authorization failed"). Resolve the token's REAL username and create
        # the private model page via API before pushing — no guessing, no errand.
        run: |
          ACCOUNT_JSON=$(curl -s -H "Authorization: Bearer $REPLICATE_API_TOKEN" https://api.replicate.com/v1/account)
          OWNER=$(echo "$ACCOUNT_JSON" | jq -r '.username // empty')
          if [ -z "$OWNER" ]; then
            echo "::error::REPLICATE_API_TOKEN is invalid — /v1/account returned: $ACCOUNT_JSON"
            echo "Recreate the repo secret with a fresh token from replicate.com/account/api-tokens"
            exit 1
          fi
          echo "Token belongs to Replicate account: $OWNER (workflow input said: ${{ github.event.inputs.owner }})"
          CREATE=$(curl -s -o /tmp/create.json -w "%{http_code}" -X POST https://api.replicate.com/v1/models \
            -H "Authorization: Bearer $REPLICATE_API_TOKEN" -H "Content-Type: application/json" \
            -d "{\"owner\":\"$OWNER\",\"name\":\"afrohit-music-trainer\",\"visibility\":\"private\",\"hardware\":\"gpu-l40s\",\"description\":\"AfroHit private ACE-Step v1 LoRA music trainer\"}")
          if [ "$CREATE" = "201" ]; then
            echo "Created private model page $OWNER/afrohit-music-trainer"
          elif grep -qi "already exists" /tmp/create.json; then
            echo "Model page $OWNER/afrohit-music-trainer already exists — good"
          else
            echo "::error::model creation failed (HTTP $CREATE): $(cat /tmp/create.json)"
            exit 1
          fi
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
      - name: Push trainer
        working-directory: services/music-trainer
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        # The env var covers cog's API calls, but the r8.im DOCKER REGISTRY push
        # needs the stored login — without it the layer upload dies with
        # "authorization failed" AFTER a full 30-min build (proven twice).
        # `cog login --token-stdin` with the API token is Replicate's own
        # documented CI flow.
        run: |
          cog --version
          echo "$REPLICATE_API_TOKEN" | cog login --token-stdin
          cog push r8.im/${{ steps.model.outputs.owner }}/afrohit-music-trainer
      - name: Next steps
        run: |
          echo "Trainer pushed. Now on the Railway WORKER service set:"
          echo "  MUSIC_TRAINER_ENABLED=1"
          echo "  MUSIC_TRAINER_MODEL=${{ steps.model.outputs.owner }}/afrohit-music-trainer"
          echo "  MUSIC_TRAINER_VERSION=<version hash from the push output above>"
          echo "The nightly flywheel fires on the next nightly-compound run."
