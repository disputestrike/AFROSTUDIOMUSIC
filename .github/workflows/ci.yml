name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: 'true'
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afrohit_ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @afrohit/db generate
      - run: pnpm run lint
      - run: pnpm run verify
      - run: pnpm run build
      - run: pnpm run security:audit
