name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afrohit_ci
      REDIS_URL: redis://localhost:6379
      REQUIRE_DSP: "1"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: afrohit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d afrohit_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install media and DSP proof stack
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python -m pip install numpy==1.26.4 scipy==1.13.1 soundfile==0.12.1 librosa==0.10.2.post1 pyloudnorm==0.1.1
      - name: Build integration test dependencies
        run: |
          pnpm --filter @afrohit/shared build
          pnpm --filter @afrohit/db build
      - name: Apply all database migrations
        run: pnpm --filter @afrohit/db migrate:safe
      - name: Verify migration state
        run: pnpm --filter @afrohit/db exec prisma migrate status
      - name: Verify zero schema drift
        run: pnpm --filter @afrohit/db exec prisma migrate diff --from-url "$DATABASE_URL" --to-schema-datamodel prisma/schema.prisma --exit-code
      - name: Verify signed distribution lifecycle
        run: pnpm --filter @afrohit/api test:distribution-lifecycle
      - name: Verify concurrent spend caps
        run: pnpm --filter @afrohit/api test:credit-caps
      - run: pnpm run lint
      - run: pnpm run verify
      - run: pnpm run build
      - run: pnpm run security:audit
