# Read-only: list the account's recent Replicate trainings — the receipt that
# the flywheel's kickoff actually reached the GPU. Runs in seconds.
name: trainer-status
on:
  workflow_dispatch:
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: List recent trainings
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $REPLICATE_API_TOKEN" "https://api.replicate.com/v1/trainings" \
            | jq -r '.results[:6][] | "\(.created_at)  \(.status)\t\(.model // "?")\t\(.id)"' || true
          echo "---"
          echo "(empty above = no trainings have ever been started on this account)"
