# Read-only: fetch one training's status, error, and log tail — the diagnosis
# tool for failed flywheel runs. Runs in seconds.
name: trainer-inspect
on:
  workflow_dispatch:
    inputs:
      training_id:
        description: "Replicate training id"
        required: true
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch training detail
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          TID: ${{ github.event.inputs.training_id }}
        run: |
          curl -s -H "Authorization: Bearer $REPLICATE_API_TOKEN" "https://api.replicate.com/v1/trainings/$TID" -o /tmp/t.json
          echo "=== status ==="; jq -r '.status' /tmp/t.json
          echo "=== error ==="; jq -r '.error // "(none)"' /tmp/t.json
          echo "=== input keys ==="; jq -r '.input | keys | join(", ")' /tmp/t.json 2>/dev/null || true
          echo "=== last 100 log lines ==="; jq -r '.logs // "(no logs)"' /tmp/t.json | tail -100
