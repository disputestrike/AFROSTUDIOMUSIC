# AfroHit MUSIC TRAINER — ACE-Step 1.5 LoKr/LoRA fine-tune as a Replicate
# DESTINATION training. Pushed to r8.im/<owner>/afrohit-music-trainer. The
# nightly flywheel points MUSIC_TRAINER_MODEL/VERSION here and training finally
# fires (it has refused nightly since ship — no legal hosted trainer existed:
# MusicGen is non-commercial; ACE-Step is MIT but has no hosted trainer, so we
# host our own).
build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  python_requirements: requirements.txt
  run:
    - "apt-get update && apt-get install -y ffmpeg git"
    # ACE-Step declares nano-vllm, which is NOT on PyPI — install from its git
    # source FIRST so the ACE-Step editable install below can resolve it.
    - "pip install git+https://github.com/GeeeekExplorer/nano-vllm.git"
    # Pin the official MIT repo at build time. Bump the ref deliberately.
    - "git clone https://github.com/ace-step/ACE-Step-1.5 /src/ACE-Step-1.5"
    - "pip install -e /src/ACE-Step-1.5"
train: "train.py:train"
