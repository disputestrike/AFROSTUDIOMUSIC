# AfroHit MUSIC TRAINER — ACE-Step v1 (3.5B, MIT) LoRA fine-tune as a Replicate
# DESTINATION training. Pushed to r8.im/<owner>/afrohit-music-trainer. The
# nightly flywheel points MUSIC_TRAINER_MODEL/VERSION here and training finally
# fires (it has refused nightly since ship — no legal hosted trainer existed:
# MusicGen is non-commercial; ACE-Step is MIT but ships no hosted trainer, so we
# host our own).
#
# WHY v1, NOT 1.5: ACE-Step 1.5 pins torch==2.10.0+cu128 (PyTorch-index-only) and
# builds flash-attn from source, and its training is a FastAPI service, not a CLI —
# an unbuildable, unwrappable research stack. ACE-Step v1 has clean unpinned
# torch/torchaudio/torchvision, no flash-attn, and a documented single-file
# trainer.py LoRA CLI. Permissive license (repo README MIT / setup.py Apache-2.0),
# same commercial-safe adapter output.
build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  python_requirements: requirements.txt
  run:
    - "apt-get update && apt-get install -y ffmpeg git && rm -rf /var/lib/apt/lists/*"
    # Cog 0.9.8 pins Torch 2.3. sitecustomize.py supplies the compatible
    # torch.nn.RMSNorm implementation ACE-Step now expects at runtime.
    # Pin the exact official revision proven by this wrapper. HEAD drift in the
    # upstream trainer must never change a production training run silently.
    - "git init /src/ACE-Step && git -C /src/ACE-Step remote add origin https://github.com/ace-step/ACE-Step && git -C /src/ACE-Step fetch --depth 1 origin 1bee4c9f5b43e30995f8d4d33b3919197ce1bd68 && git -C /src/ACE-Step checkout --detach FETCH_HEAD && test \"$(git -C /src/ACE-Step rev-parse HEAD)\" = \"1bee4c9f5b43e30995f8d4d33b3919197ce1bd68\""
    # --no-deps: every dependency is already pinned in requirements.txt above
    # (cuda-matched torch included); this only wires `import acestep` onto the path.
    - "pip install -e /src/ACE-Step --no-deps"
# cog 0.9.8 refuses to push without a predict entry — and ours is real: render
# a song via ACE-Step v1, optionally through a trained AfroHit LoRA (the first
# cut of the serving path). Training (the nightly flywheel path) uses train.
predict: "predict.py:Predictor"
train: "train.py:train"
